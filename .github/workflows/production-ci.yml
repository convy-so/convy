name: Production CI

on:
  push:
    branches: [production]
  pull_request:
    branches: [production]

concurrency:
  group: production-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint and build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          CI: true
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          BETTER_AUTH_SECRET: ci-build-placeholder-min-32-chars-long
          GOOGLE_CLIENT_ID: ci-placeholder
          GOOGLE_CLIENT_SECRET: ci-placeholder
          RESEND_API_KEY: re_ci_placeholder
          RESEND_FROM_EMAIL: ci@localhost
          GOOGLE_GENERATIVE_AI_API_KEY: ci-placeholder
          convy_supabase_secret_key: ci-placeholder
          NEXT_PUBLIC_APP_URL: https://example.com
          NEXT_PUBLIC_BETTER_AUTH_URL: https://example.com
          NEXT_PUBLIC_WEBSOCKET_URL: wss://example.com
        run: pnpm build
