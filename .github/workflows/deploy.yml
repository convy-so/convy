##############################################################
# .github/workflows/deploy.yml
#
# Triggers on every push to `main`.
# What it does (in order):
#   1. Builds all 3 Docker images (in parallel jobs)
#   2. Pushes them to Amazon ECR
#   3. Runs Drizzle database migrations (safe, before new containers start)
#   4. Force-redeploys each ECS service with the new image
#   5. Waits for all 3 services to stabilize before marking success
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   AWS_ACCESS_KEY_ID         IAM user access key
#   AWS_SECRET_ACCESS_KEY     IAM user secret key
#   AWS_REGION                e.g. eu-west-1
#   AWS_ACCOUNT_ID            Your 12-digit AWS account number
#   DATABASE_URL              Supabase PostgreSQL URL (for migrations)
#   NEXT_PUBLIC_SUPABASE_URL
#   NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
#   NEXT_PUBLIC_WEBSOCKET_URL e.g. wss://yourdomain.com
#
##############################################################

name: 🚀 Deploy to Production

on:
  push:
    branches:
      - main # ← Change this to your production branch name if different

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

# Cancel any in-progress deployment for the same branch
# so two pushes in quick succession don't race.
concurrency:
  group: production-deploy
  cancel-in-progress: false # Never cancel a running deploy mid-way; queue it instead

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
  ECS_CLUSTER: convy-production

##############################################################
# JOB 1 — Build & Push Docker images
# All 3 images are built in parallel to save time.
##############################################################
jobs:
  build-and-push:
    name: 🐳 Build & Push Images
    runs-on: ubuntu-latest

    # Expose the image tag as an output so the deploy job can use it.
    outputs:
      image_tag: ${{ steps.vars.outputs.IMAGE_TAG }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Use the first 7 chars of the Git SHA as the image tag.
      # This gives you exact traceability: which code is running in ECS.
      - name: Set image tag
        id: vars
        run: echo "IMAGE_TAG=$(echo $GITHUB_SHA | head -c7)" >> $GITHUB_OUTPUT

      # ── Build Docker layer cache setup ──────────────────────
      # GitHub Actions caches Docker layers between runs so rebuilds
      # are fast when only a few files changed.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Next.js Image ──────────────────────────────────────
      - name: Build & Push Next.js image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.nextjs
          push: true
          # Tag with BOTH the SHA (immutable) and latest (ECS rolling deploy pulls this)
          tags: |
            ${{ env.ECR_REGISTRY }}/convy/nextjs:${{ steps.vars.outputs.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/convy/nextjs:latest
          # Pass NEXT_PUBLIC_* at build time (Next.js inlines them into the JS bundle)
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_WEBSOCKET_URL=${{ secrets.NEXT_PUBLIC_WEBSOCKET_URL }}
          # Use GitHub Actions cache for Docker layers
          cache-from: type=gha,scope=nextjs
          cache-to: type=gha,mode=max,scope=nextjs

      # ── WebSocket Image ────────────────────────────────────
      - name: Build & Push WebSocket image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.websocket
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/convy/websocket:${{ steps.vars.outputs.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/convy/websocket:latest
          cache-from: type=gha,scope=websocket
          cache-to: type=gha,mode=max,scope=websocket

      # ── Workers Image ──────────────────────────────────────
      - name: Build & Push Workers image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.workers
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/convy/workers:${{ steps.vars.outputs.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/convy/workers:latest
          cache-from: type=gha,scope=workers
          cache-to: type=gha,mode=max,scope=workers

  ##############################################################
  # JOB 2 — Run Database Migrations
  # Runs AFTER images are pushed but BEFORE new containers start.
  # This ensures the new schema is in place before new code runs.
  ##############################################################
  migrate:
    name: 🗄️ Run DB Migrations
    runs-on: ubuntu-latest
    needs: build-and-push # Wait for images to be built first

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.10.0"

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Drizzle migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm drizzle-kit migrate

  ##############################################################
  # JOB 3 — Deploy to ECS
  # Force-redeploys all 3 services after migration succeeds.
  # ECS performs a rolling update: new tasks start, health checks
  # pass, then old tasks are terminated — zero downtime.
  ##############################################################
  deploy:
    name: 🚢 Deploy to ECS
    runs-on: ubuntu-latest
    needs: [build-and-push, migrate] # Both build AND migration must succeed

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # force-new-deployment tells ECS to pull the new :latest image
      # and replace running tasks with a rolling update.
      - name: Deploy Next.js service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service convy-nextjs \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
          echo "✅ Next.js deployment triggered"

      - name: Deploy WebSocket service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service convy-websocket \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
          echo "✅ WebSocket deployment triggered"

      - name: Deploy Workers service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service convy-workers \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
          echo "✅ Workers deployment triggered"

      # Wait for ECS to confirm all 3 services are stable
      # (all desired tasks running, health checks passing).
      # Times out after 10 minutes — adjust if your app is slow to start.
      - name: Wait for services to stabilize
        run: |
          echo "⏳ Waiting for all services to stabilize..."
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services convy-nextjs convy-websocket convy-workers \
            --region ${{ env.AWS_REGION }}
          echo "✅ All 3 services are running the new version!"

      - name: 🎉 Deployment summary
        run: |
          IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}
          echo "=================================================="
          echo "  Deployment complete!"
          echo "  Image tag: $IMAGE_TAG"
          echo "  Cluster:   ${{ env.ECS_CLUSTER }}"
          echo "  Services:  convy-nextjs | convy-websocket | convy-workers"
          echo "=================================================="
