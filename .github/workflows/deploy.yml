##############################################################
# deploy.yml — Unified CI/CD Pipeline for Staging & Production
#
# Triggers:
#   - Push to `staging`    → deploys to Staging environment
#   - Push to `production` → deploys to Production environment
#   - Manual trigger       → deploys whichever branch you select
#
# Architecture:
#   build-and-push → migrate → deploy
#
# Each job uses GitHub Environments so that secrets (like
# DATABASE_URL, ECS_CLUSTER, etc.) are automatically scoped
# to the correct environment. This means one workflow file
# handles both environments with zero duplication.
#
# Required Environment Secrets (set per environment):
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION,
#   AWS_ACCOUNT_ID, DATABASE_URL,
#   NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY,
#   NEXT_PUBLIC_WEBSOCKET_URL,
#   ECS_CLUSTER, ECS_SERVICE_NEXTJS, ECS_SERVICE_WEBSOCKET,
#   ECS_SERVICE_WORKERS
##############################################################

name: 🚀 Deploy App

on:
  push:
    branches:
      - staging
      - production

  workflow_dispatch:

# Prevent overlapping deployments on the same branch
concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

# ─── Permissions ──────────────────────────────────────────────
permissions:
  contents: read         # checkout code
  id-token: write        # OIDC (if you switch to role-based auth later)

jobs:
  # ════════════════════════════════════════════════════════════
  # JOB 1 — Build Docker images & push to ECR
  # ════════════════════════════════════════════════════════════
  build-and-push:
    name: 🐳 Build & Push Images
    runs-on: ubuntu-latest
    timeout-minutes: 20

    environment:
      name: ${{ github.ref_name == 'production' && 'Production' || 'Staging' }}

    outputs:
      image_tag: ${{ steps.vars.outputs.IMAGE_TAG }}
      env_name: ${{ steps.vars.outputs.ENV_NAME }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set variables
        id: vars
        run: |
          SHORT_SHA=$(echo "$GITHUB_SHA" | head -c7)
          BRANCH="${{ github.ref_name }}"

          # Tag images with commit SHA + environment-specific "latest" tag
          if [ "$BRANCH" = "production" ]; then
            ENV_TAG="latest"
            ENV_NAME="Production"
          else
            ENV_TAG="staging"
            ENV_NAME="Staging"
          fi

          echo "IMAGE_TAG=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "ENV_TAG=${ENV_TAG}" >> $GITHUB_OUTPUT
          echo "ENV_NAME=${ENV_NAME}" >> $GITHUB_OUTPUT

          ECR="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com"
          echo "ECR_REGISTRY=${ECR}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Next.js Image ──────────────────────────────────────
      - name: Build & Push Next.js image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.nextjs
          push: true
          tags: |
            ${{ steps.vars.outputs.ECR_REGISTRY }}/convy/nextjs:${{ steps.vars.outputs.IMAGE_TAG }}
            ${{ steps.vars.outputs.ECR_REGISTRY }}/convy/nextjs:${{ steps.vars.outputs.ENV_TAG }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_WEBSOCKET_URL=${{ secrets.NEXT_PUBLIC_WEBSOCKET_URL }}
          cache-from: type=gha,scope=nextjs-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=nextjs-${{ github.ref_name }}

      # ── WebSocket Image ────────────────────────────────────
      - name: Build & Push WebSocket image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.websocket
          push: true
          tags: |
            ${{ steps.vars.outputs.ECR_REGISTRY }}/convy/websocket:${{ steps.vars.outputs.IMAGE_TAG }}
            ${{ steps.vars.outputs.ECR_REGISTRY }}/convy/websocket:${{ steps.vars.outputs.ENV_TAG }}
          cache-from: type=gha,scope=websocket-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=websocket-${{ github.ref_name }}

      # ── Workers Image ──────────────────────────────────────
      - name: Build & Push Workers image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.workers
          push: true
          tags: |
            ${{ steps.vars.outputs.ECR_REGISTRY }}/convy/workers:${{ steps.vars.outputs.IMAGE_TAG }}
            ${{ steps.vars.outputs.ECR_REGISTRY }}/convy/workers:${{ steps.vars.outputs.ENV_TAG }}
          cache-from: type=gha,scope=workers-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=workers-${{ github.ref_name }}

  # ════════════════════════════════════════════════════════════
  # JOB 2 — Run database migrations
  # ════════════════════════════════════════════════════════════
  migrate:
    name: 🗄️ Run DB Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-and-push

    environment:
      name: ${{ github.ref_name == 'production' && 'Production' || 'Staging' }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # No `version:` here — pnpm/action-setup@v4 automatically reads
        # the `packageManager` field from package.json (the single source of truth).

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Drizzle migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm drizzle-kit migrate

  # ════════════════════════════════════════════════════════════
  # JOB 3 — Deploy to ECS
  # ════════════════════════════════════════════════════════════
  deploy:
    name: 🚢 Deploy to ${{ needs.build-and-push.outputs.env_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-and-push, migrate]

    environment:
      name: ${{ github.ref_name == 'production' && 'Production' || 'Staging' }}
      url: ${{ github.ref_name == 'production' && 'https://getconvy.pro' || 'https://staging.getconvy.pro' }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy Next.js service
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_SERVICE_NEXTJS }} \
            --force-new-deployment \
            --region ${{ secrets.AWS_REGION }}
          echo "✅ Next.js deployment triggered"

      - name: Deploy WebSocket service
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_SERVICE_WEBSOCKET }} \
            --force-new-deployment \
            --region ${{ secrets.AWS_REGION }}
          echo "✅ WebSocket deployment triggered"

      - name: Deploy Workers service
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_SERVICE_WORKERS }} \
            --force-new-deployment \
            --region ${{ secrets.AWS_REGION }}
          echo "✅ Workers deployment triggered"

      - name: Wait for services to stabilize
        run: |
          echo "⏳ Waiting for all services to stabilize..."
          aws ecs wait services-stable \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --services ${{ secrets.ECS_SERVICE_NEXTJS }} ${{ secrets.ECS_SERVICE_WEBSOCKET }} ${{ secrets.ECS_SERVICE_WORKERS }} \
            --region ${{ secrets.AWS_REGION }}
          echo "✅ All services are stable!"

      - name: 🎉 Deployment summary
        run: |
          echo "══════════════════════════════════════════════"
          echo "  ✅ ${{ needs.build-and-push.outputs.env_name }} deployment complete!"
          echo "  📦 Image tag: ${{ needs.build-and-push.outputs.image_tag }}"
          echo "  🏗️  Cluster:  ${{ secrets.ECS_CLUSTER }}"
          echo "  🌐 Branch:   ${{ github.ref_name }}"
          echo "══════════════════════════════════════════════"
