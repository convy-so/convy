name: 🚀 Deploy App

on:
  push:
    branches:
      - main
      - staging
      - production

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

# Cancel any in-progress deployment for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: 🐳 Build & Push Images
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref_name == 'production' && 'Production' || github.ref_name == 'staging' && 'Staging' || 'Development' }}
    
    outputs:
      image_tag: ${{ steps.vars.outputs.IMAGE_TAG }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: vars
        run: echo "IMAGE_TAG=$(echo $GITHUB_SHA | head -c7)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Next.js Image ──────────────────────────────────────
      - name: Build & Push Next.js image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.nextjs
          push: true
          tags: |
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/convy/nextjs:${{ steps.vars.outputs.IMAGE_TAG }}
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/convy/nextjs:latest
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_WEBSOCKET_URL=${{ secrets.NEXT_PUBLIC_WEBSOCKET_URL }}
          cache-from: type=gha,scope=nextjs-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=nextjs-${{ github.ref_name }}

      # ── WebSocket Image ────────────────────────────────────
      - name: Build & Push WebSocket image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.websocket
          push: true
          tags: |
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/convy/websocket:${{ steps.vars.outputs.IMAGE_TAG }}
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/convy/websocket:latest
          cache-from: type=gha,scope=websocket-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=websocket-${{ github.ref_name }}

      # ── Workers Image ──────────────────────────────────────
      - name: Build & Push Workers image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.workers
          push: true
          tags: |
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/convy/workers:${{ steps.vars.outputs.IMAGE_TAG }}
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/convy/workers:latest
          cache-from: type=gha,scope=workers-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=workers-${{ github.ref_name }}

  migrate:
    name: 🗄️ Run DB Migrations
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: ${{ github.ref_name == 'production' && 'Production' || github.ref_name == 'staging' && 'Staging' || 'Development' }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.10.0"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Drizzle migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm drizzle-kit migrate

  deploy:
    name: 🚢 Deploy to ECS
    runs-on: ubuntu-latest
    needs: [build-and-push, migrate]
    environment:
      name: ${{ github.ref_name == 'production' && 'Production' || github.ref_name == 'staging' && 'Staging' || 'Development' }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy Next.js service
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_SERVICE_NEXTJS }} \
            --force-new-deployment \
            --region ${{ secrets.AWS_REGION }}

      - name: Deploy WebSocket service
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_SERVICE_WEBSOCKET }} \
            --force-new-deployment \
            --region ${{ secrets.AWS_REGION }}

      - name: Deploy Workers service
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_SERVICE_WORKERS }} \
            --force-new-deployment \
            --region ${{ secrets.AWS_REGION }}

      - name: Wait for services to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --services ${{ secrets.ECS_SERVICE_NEXTJS }} ${{ secrets.ECS_SERVICE_WEBSOCKET }} ${{ secrets.ECS_SERVICE_WORKERS }} \
            --region ${{ secrets.AWS_REGION }}

