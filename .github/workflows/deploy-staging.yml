##############################################################
# .github/workflows/deploy-staging.yml
#
# Triggers on every push to `staging` branch.
# Mirrors the production workflow but targets the staging cluster.
#
# Required GitHub Secrets (shared with production):
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION, AWS_ACCOUNT_ID
#   DATABASE_URL (for migrations — uses the same DB as production,
#                 or a staging DB if you create one)
#   NEXT_PUBLIC_SUPABASE_URL
#   NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
#   NEXT_PUBLIC_WEBSOCKET_URL_STAGING  ← wss://staging.getconvy.pro
##############################################################

name: 🧪 Deploy to Staging

on:
  push:
    branches:
      - staging

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

concurrency:
  group: staging-deploy
  cancel-in-progress: false

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
  ECS_CLUSTER: convy-staging

##############################################################
# JOB 1 — Build & Push with :staging tag
##############################################################
jobs:
  build-and-push:
    name: 🐳 Build & Push Staging Images
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.vars.outputs.IMAGE_TAG }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: vars
        run: echo "IMAGE_TAG=$(echo $GITHUB_SHA | head -c7)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Next.js Image ──────────────────────────────────────
      - name: Build & Push Next.js image (staging)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.nextjs
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/convy/nextjs:${{ steps.vars.outputs.IMAGE_TAG }}-staging
            ${{ env.ECR_REGISTRY }}/convy/nextjs:staging
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_WEBSOCKET_URL=wss://staging.getconvy.pro
          cache-from: type=gha,scope=nextjs-staging
          cache-to: type=gha,mode=max,scope=nextjs-staging

      # ── WebSocket Image ────────────────────────────────────
      - name: Build & Push WebSocket image (staging)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.websocket
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/convy/websocket:${{ steps.vars.outputs.IMAGE_TAG }}-staging
            ${{ env.ECR_REGISTRY }}/convy/websocket:staging
          cache-from: type=gha,scope=websocket-staging
          cache-to: type=gha,mode=max,scope=websocket-staging

      # ── Workers Image ──────────────────────────────────────
      - name: Build & Push Workers image (staging)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.workers
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/convy/workers:${{ steps.vars.outputs.IMAGE_TAG }}-staging
            ${{ env.ECR_REGISTRY }}/convy/workers:staging
          cache-from: type=gha,scope=workers-staging
          cache-to: type=gha,mode=max,scope=workers-staging

  ##############################################################
  # JOB 2 — Run Database Migrations
  ##############################################################
  migrate:
    name: 🗄️ Run DB Migrations (Staging)
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.10.0"

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Drizzle migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm drizzle-kit migrate

  ##############################################################
  # JOB 3 — Deploy to Staging ECS
  ##############################################################
  deploy:
    name: 🚢 Deploy to Staging ECS
    runs-on: ubuntu-latest
    needs: [build-and-push, migrate]

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Next.js service (staging)
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service staging-nextjs \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
          echo "✅ Staging Next.js deployment triggered"

      - name: Deploy WebSocket service (staging)
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service staging-websocket \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
          echo "✅ Staging WebSocket deployment triggered"

      - name: Deploy Workers service (staging)
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service staging-workers \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
          echo "✅ Staging Workers deployment triggered"

      - name: Wait for staging services to stabilize
        run: |
          echo "⏳ Waiting for all staging services to stabilize..."
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services staging-nextjs staging-websocket staging-workers \
            --region ${{ env.AWS_REGION }}
          echo "✅ All staging services are running the new version!"

      - name: 🎉 Staging deployment summary
        run: |
          IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}
          echo "=================================================="
          echo "  Staging deployment complete!"
          echo "  Image tag: ${IMAGE_TAG}-staging"
          echo "  Cluster:   ${{ env.ECS_CLUSTER }}"
          echo "  URL:       https://staging.getconvy.pro"
          echo "=================================================="
