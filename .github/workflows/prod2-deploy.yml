name: Prod2 CI and EC2 Deploy

on:
  push:
    branches: [prod2]
  pull_request:
    branches: [prod2]

concurrency:
  group: prod2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint and build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          CI: true
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          BETTER_AUTH_SECRET: ci-build-placeholder-min-32-chars-long
          GOOGLE_CLIENT_ID: ci-placeholder
          GOOGLE_CLIENT_SECRET: ci-placeholder
          RESEND_API_KEY: re_ci_placeholder
          RESEND_FROM_EMAIL: ci@localhost
          GOOGLE_GENERATIVE_AI_API_KEY: ci-placeholder
          convy_supabase_secret_key: ci-placeholder
          NEXT_PUBLIC_APP_URL: https://example.com
          NEXT_PUBLIC_BETTER_AUTH_URL: https://example.com
          NEXT_PUBLIC_WEBSOCKET_URL: wss://example.com
        run: pnpm build

  deploy:
    name: Deploy to EC2
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/prod2'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 40m
          script: |
            set -e
            cd /opt/convy
            git fetch origin prod2
            git checkout prod2
            git reset --hard origin/prod2
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              --env-file .env.prod up -d --build --remove-orphans
            wget -qO- http://127.0.0.1:3000/api/health
