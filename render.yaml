services:
  # Background Worker (BullMQ)
  - type: worker
    name: convy-worker
    env: node
    buildCommand: pnpm install && pnpm run workers:build
    startCommand: pnpm run workers:start
    envVars:
      - key: NODE_ENV
        value: production
      # These will be set manually in the Render dashboard
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: convy-redis
          property: connectionString

  # WebSocket Server
  - type: web
    name: convy-websocket
    env: node
    buildCommand: pnpm install && pnpm run websocket:build
    startCommand: pnpm run websocket:start
    envVars:
      - key: NODE_ENV
        value: production
      # These will be set manually in the Render dashboard
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: convy-redis
          property: connectionString
      # The port Render uses internally
      - key: PORT
        value: 10000

  # Redis instance for Background Jobs
  - type: redis
    name: convy-redis
    ipAllowList: [] # internal connections only
    plan: free
